<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hostel Dashboard</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #333;
    margin-bottom: 25px;
}

.dashboard-container {
    max-width: 1100px;
    margin: auto;
}

.hostel-name {
    background: #5f7a5f;
    color: white;
    padding: 15px;
    border-radius: 8px;
    font-size: 20px;
    text-align: center;
    margin-bottom: 20px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 5px 10px rgba(0,0,0,0.15);
}

.card h3 {
    margin: 10px 0;
    color: #333;
}

.card p {
    color: #666;
    font-size: 14px;
}

.icon {
    font-size: 35px;
    color: #007bff;
}

.footer {
    text-align: center;
    margin-top: 25px;
    color: #777;
    font-size: 14px;
}
</style>

</head>

<body>

<h1>Girls Hostel Management System</h1>

<div class="dashboard-container">

    <div class="hostel-name">
        Girls Hostel - Dashboard
    </div>

    <div class="cards">

        <div class="card"  onclick="openDashboard('Savitri Bai Girls Hostel')">
            <h3>Savitri bai Girls Hostel</h3>
        </div>

        <div class="card" onclick="openDashboard('Madevi Girls Hostel')">
            <h3>Mahadevi Girls Hostel</h3>
        </div>

        <div class="card" onclick="openDashboard('Mahamaya Girls Hostel')" >
            <h3>Mahamaya Girls Hostel</h3>
        </div>

        <div class="card"  onclick="openDashboard('Laxmi Bai Girls Hostel')">
            <h3>Rani Laxmi Bai Girls Hostel</h3>
        </div>

        <div class="card" onclick="openDashboard('Ismat Chugtai Girls Hostel')">
            <h3>Ishmat Chugtai Girls Hostel</h3>
        </div>

        <div class="card" onclick="openDashboard('Rama Bai Girls Hostel')">
            <h3>Rama Bai Girls Hostel</h3>
        </div>

        <div class="card"  onclick="openDashboard('Chhatrapati Sahuji Girls Hostel')">
            <h3>Chhatrapati Shahuji Girls Hostel</h3>
        </div>

    </div>

</div>

<div class="footer">
    © 2026 Girls Hostel Monitoring System
</div>

<script>
function openDashboard(hostelName) {
    window.location.href = "dashboard.html?hostel=" + encodeURIComponent(hostelName);
}
</script>

</body>
</html>

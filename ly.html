<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leave Entries | Hostel Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:#f4f6fb;
}

/* HEADER */
.header{
    height:60px;
    background:linear-gradient(90deg,#1e5dbf,#2979ff);
    color:#fff;
    display:flex;
    align-items:center;
    padding:0 20px;
    font-size:20px;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:60px;
    left:0;
    width:220px;
    height:calc(100% - 60px);
    background:#1f4fa3;
    color:#fff;
}

.sidebar a{
    display:block;
    padding:14px 20px;
    color:#fff;
    text-decoration:none;
    font-size:15px;
}

.sidebar a:hover, .sidebar a.active{
    background:#2e6ad9;
}

/* MAIN */
.main{
    margin-left:220px;
    padding:20px;
}

/* CARD */
.card{
    background:#fff;
    padding:18px 20px;
    border-radius:6px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    margin-bottom:20px;
}

h2{
    margin:0;
    color:#1f4fa3;
}

/* FORM */
.form-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:20px 25px;
    margin-top:15px;
}

.form-group label{
    font-weight:600;
    display:block;
    margin-bottom:6px;
}

.form-group input, 
.form-group select, 
.form-group textarea{
    width:100%;
    height:38px;
    padding:8px 10px;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:14px;
}

textarea{
    height:80px;
    resize:none;
}

button{
    margin-top:15px;
    background:#1f4fa3;
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#163d7a;
}

/* TABLE */
.table-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.table-head input{
    padding:7px 10px;
    border:1px solid #ccc;
    border-radius:4px;
}

.table-box{
    width:100%;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    background:#fff;
}

th,td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
    white-space:nowrap;
}

th{
    background:#1f4fa3;
    color:#fff;
}

/* COLUMN WIDTHS */
th:nth-child(1), td:nth-child(1){ width:10%; }
th:nth-child(2), td:nth-child(2){ width:18%; }
th:nth-child(3), td:nth-child(3){ width:10%; }
th:nth-child(4), td:nth-child(4){ width:12%; }
th:nth-child(5), td:nth-child(5){ width:12%; }
th:nth-child(6), td:nth-child(6){ width:12%; }
th:nth-child(7), td:nth-child(7){ width:26%; }

/* BADGES */
.badge{
    padding:5px 10px;
    border-radius:4px;
    color:#fff;
    font-size:13px;
}

.home{background:#007bff;}
.medical{background:#28a745;}
.emergency{background:#dc3545;}
</style>
</head>

<body>

<div class="header">Hostel Biometric Attendance System</div>

<div class="sidebar">
    <a href="#">Dashboard</a>
    <a href="#">Students</a>
    <a href="#">Attendance Status</a>
    <a href="#">Absentee List</a>
    <a href="#">Late Entry Report</a>
    <a href="#" class="active">Leave Entries</a>
    <a href="#">Monthly Report</a>
</div>

<div class="main">

<div class="card">
<h2>Leave Entry</h2>

<form id="leaveForm">

<div class="form-grid">

    <div class="form-group">
        <label>Student Name</label>
        <input type="text" id="name" required>
    </div>

    <div class="form-group">
        <label>Roll Number</label>
        <input type="text" id="roll" required>
    </div>

    <div class="form-group">
        <label>Room Number</label>
        <input type="text" id="room" required>
    </div>

    <div class="form-group">
        <label>Leave Start Date</label>
        <input type="date" id="from" required>
    </div>

    <div class="form-group">
        <label>Leave End Date</label>
        <input type="date" id="to" required>
    </div>

    <div class="form-group">
        <label>Leave Type</label>
        <select id="type">
            <option value="Home">Home Leave</option>
            <option value="Medical">Medical Leave</option>
            <option value="Emergency">Emergency Leave</option>
        </select>
    </div>

    <div class="form-group" style="grid-column:1/3">
        <label>Remarks</label>
        <textarea id="remarks"></textarea>
    </div>

</div>

<button type="submit">Save Leave Entry</button>

</form>
</div>

<div class="card">

<div class="table-head">
    <h2>Recent Leave Entries</h2>
    <input type="text" placeholder="Search..." onkeyup="searchTable(this.value)">
</div>

<div class="table-box">
<table id="leaveTable">
<thead>
<tr>
<th>Roll No</th>
<th>Name</th>
<th>Room</th>
<th>From</th>
<th>To</th>
<th>Type</th>
<th>Remarks</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

</div>

<script>
const API_URL = "fetch_leave.php";
const SAVE_URL = "save_leave.php";

document.getElementById("leaveForm").addEventListener("submit", function(e){
    e.preventDefault();

    let data = {
        name: name.value,
        roll: roll.value,
        room: room.value,
        from: from.value,
        to: to.value,
        type: type.value,
        remarks: remarks.value
    };

    fetch(SAVE_URL,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(data)
    }).then(()=> {
        alert("Leave Entry Saved");
        loadData();
        this.reset();
    });
});

function loadData(){
    fetch(API_URL)
    .then(res=>res.json())
    .then(data=>{
        let rows="";
        data.forEach(d=>{
            let cls = d.type.toLowerCase();
            rows+=`
            <tr>
                <td>${d.roll}</td>
                <td>${d.name}</td>
                <td>${d.room}</td>
                <td>${d.from}</td>
                <td>${d.to}</td>
                <td><span class="badge ${cls}">${d.type}</span></td>
                <td>${d.remarks}</td>
            </tr>`;
        });
        document.querySelector("#leaveTable tbody").innerHTML=rows;
    });
}

function searchTable(value){
    let filter = value.toUpperCase();
    let rows = document.querySelectorAll("#leaveTable tbody tr");

    rows.forEach(row=>{
        row.style.display = row.innerText.toUpperCase().includes(filter) ? "" : "none";
    });
}

loadData();
</script>

</body>
</html>
